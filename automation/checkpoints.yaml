checkpoints:
  - id: CP-01
    service: GitHub
    purpose: Student Pack verification and repository administration
    requires_human_login: true
    output:
      - student_pack_active
      - repository_url
  - id: CP-02
    service: Heroku
    purpose: Redeem recurring student credit and provision the core app/database
    requires_human_login: true
    prerequisites: [CP-01]
    output:
      - app_name
      - region
      - heroku_hostname
      - postgres_attachment
      - custom_domain_dns_target
  - id: CP-03
    service: Auth0
    purpose: Configure CLI Device Flow and MCP OAuth
    requires_human_login: true
    output:
      - issuer
      - cli_client_id
      - audience
      - scopes
  - id: CP-04
    service: Vercel Domains
    purpose: Preserve glossa.sh and configure only mcp.glossa.sh
    requires_human_login: true
    prerequisites: [CP-02]
    output:
      - authoritative_nameservers
      - dns_backup_recorded
      - mcp_dns_target
      - apex_site_verified
      - certificate_status
  - id: CP-05
    service: npm
    purpose: Configure trusted publishing for @ariobarin/glossa
    requires_human_login: true
    prerequisites: [CP-01]
    output:
      - package_url
      - trusted_publishing_enabled
