name: Regenerate beta-readiness docs

on:
  push:
    branches: [fix/beta-readiness]

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/beta-readiness
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run docs:build
      - name: Commit generated documentation
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/*.html site/docs/*.html
          git commit -m "Regenerate site documentation"
          git push origin HEAD:fix/beta-readiness
