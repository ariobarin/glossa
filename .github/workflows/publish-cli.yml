name: Publish CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - name: Verify release tag
        shell: bash
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          test "cli-v${version}" = "${GITHUB_REF_NAME}"
      - run: npm run build --workspace @ariobarin/glossa
      - name: Publish package
        shell: bash
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          if [[ "$version" == *-* ]]; then
            tag=beta
          else
            tag=latest
          fi
          npm publish --workspace @ariobarin/glossa --tag "$tag"
