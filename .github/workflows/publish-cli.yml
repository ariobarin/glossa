name: Publish CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - name: Verify release tag
        shell: bash
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          [[ "$version" == 0.1.* ]]
          test "cli-v${version}" = "${GITHUB_REF_NAME}"
      - run: npm run check

  standalone:
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: bun-windows-x64-baseline
            asset: glossa-windows-x64.exe
          - runner: windows-11-arm
            target: bun-windows-arm64
            asset: glossa-windows-arm64.exe
          - runner: ubuntu-24.04
            target: bun-linux-x64-baseline
            asset: glossa-linux-x64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: glossa-linux-arm64
          - runner: macos-15-intel
            target: bun-darwin-x64-baseline
            asset: glossa-macos-x64
          - runner: macos-15
            target: bun-darwin-arm64
            asset: glossa-macos-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: npm ci
      - run: npm run build --workspace @glossa/protocol
      - name: Build standalone executable
        env:
          GLOSSA_BUN_TARGET: ${{ matrix.target }}
          GLOSSA_STANDALONE_ASSET: ${{ matrix.asset }}
        run: bun packages/cli/scripts/build-standalone.ts
      - name: Sign macOS executable
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - \
            --entitlements packages/cli/scripts/macos-entitlements.plist \
            "dist/standalone/${{ matrix.asset }}"
          codesign --verify --deep --strict "dist/standalone/${{ matrix.asset }}"
      - name: Smoke standalone executable
        run: node packages/cli/scripts/smoke-standalone.mjs "dist/standalone/${{ matrix.asset }}"
      - name: Write checksum
        env:
          ASSET: ${{ matrix.asset }}
        shell: node {0}
        run: |
          const { createHash } = require("node:crypto");
          const { readFileSync, writeFileSync } = require("node:fs");
          const path = `dist/standalone/${process.env.ASSET}`;
          const hash = createHash("sha256").update(readFileSync(path)).digest("hex");
          writeFileSync(`${path}.sha256`, `${hash}  ${process.env.ASSET}\n`);
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/standalone/${{ matrix.asset }}
            dist/standalone/${{ matrix.asset }}.sha256
          if-no-files-found: error

  publish-npm:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm run build --workspace @glossa/protocol
      - run: npm run build --workspace @ariobarin/glossa
      - name: Publish package
        shell: bash
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          if [[ "$version" == *-* ]]; then
            tag=beta
          else
            tag=latest
          fi
          npm publish --workspace @ariobarin/glossa --tag "$tag"

  publish-release:
    needs: standalone
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: dist/standalone
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version=${GITHUB_REF_NAME#cli-v}
          prerelease=()
          if [[ "$version" == *-* ]]; then
            prerelease=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            dist/standalone/* \
            --verify-tag \
            --title "Glossa $version" \
            --notes "Glossa CLI $version." \
            "${prerelease[@]}"
