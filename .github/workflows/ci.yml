name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  relay-matrix:
    name: relay-check (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.9.0", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test --workspace @glossa/relay

  relay-check:
    needs: relay-matrix
    runs-on: ubuntu-latest
    steps:
      - run: echo "relay matrix passed"

  windows-matrix:
    name: windows-check (${{ matrix.node-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: ["22.9.0", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: node packages/cli/dist/main.js --version

  windows-check:
    needs: windows-matrix
    runs-on: ubuntu-latest
    steps:
      - run: echo "windows matrix passed"

  deploy-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      relay: ${{ steps.changed.outputs.relay }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: changed
        name: Detect relay changes
        env:
          BEFORE: ${{ github.event.before }}
        shell: bash
        run: |
          if [[ "$BEFORE" =~ ^0+$ ]] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "relay=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$BEFORE" "$GITHUB_SHA" -- \
            apps/relay \
            packages/protocol \
            package.json \
            package-lock.json \
            scripts/clean.mjs \
            tsconfig.base.json \
            Procfile; then
            echo "relay=false" >> "$GITHUB_OUTPUT"
          else
            echo "relay=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    if: needs.deploy-changes.outputs.relay == 'true'
    needs: [relay-check, windows-check, deploy-changes]
    runs-on: ubuntu-latest
    concurrency:
      group: heroku-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://mcp.glossa.sh/healthz
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Deploy tested commit to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git config --global credential.helper store
          printf '%s\n' "https://heroku:${HEROKU_API_KEY}@git.heroku.com" > ~/.git-credentials
          trap 'rm -f ~/.git-credentials' EXIT
          git push https://git.heroku.com/ariobarin-glossa.git HEAD:main
      - name: Verify production health
        run: |
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            --max-time 10 \
            https://mcp.glossa.sh/healthz

  inspect-main-ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: 4b3a3fdbc2ea30b90056ca907caf35cc6b3cc0b6
    steps:
      - name: Verify post-merge main CI
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          response="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&event=push&per_page=10")"

          echo "$response" | jq -c '.workflow_runs[] | {
            id,
            name,
            run_number,
            event,
            head_sha,
            status,
            conclusion,
            html_url
          }'

          count="$(echo "$response" | jq '[.workflow_runs[] | select(.name == "CI")] | length')"
          if [[ "$count" -eq 0 ]]; then
            echo "No push-triggered CI run found for ${TARGET_SHA}." >&2
            exit 1
          fi

          echo "$response" | jq -e '
            [.workflow_runs[] | select(.name == "CI")] |
            all(.status == "completed" and .conclusion == "success")
          '
