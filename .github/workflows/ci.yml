name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  relay-matrix:
    name: relay-check (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.9.0", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test --workspace @glossa/relay
      - run: npm run test --workspace @ariobarin/glossa

  relay-check:
    needs: relay-matrix
    runs-on: ubuntu-latest
    steps:
      - run: echo "relay matrix passed"

  windows-matrix:
    name: windows-check (${{ matrix.node-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: ["22.9.0", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: node packages/cli/dist/main.js --version

  windows-check:
    needs: windows-matrix
    runs-on: ubuntu-latest
    steps:
      - run: echo "windows matrix passed"

  standalone-matrix:
    name: standalone-check (${{ matrix.asset }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: bun-windows-x64-baseline
            asset: glossa-windows-x64.exe
            bun-package: "@oven/bun-windows-x64-baseline@1.3.14"
            bun-command: ./node_modules/@oven/bun-windows-x64-baseline/bin/bun.exe
          - runner: windows-11-arm
            target: bun-windows-arm64
            asset: glossa-windows-arm64.exe
            bun-package: none
            bun-command: bun
          - runner: ubuntu-24.04
            target: bun-linux-x64-baseline
            asset: glossa-linux-x64
            bun-package: none
            bun-command: bun
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: glossa-linux-arm64
            bun-package: none
            bun-command: bun
          - runner: macos-15-intel
            target: bun-darwin-x64-baseline
            asset: glossa-macos-x64
            bun-package: none
            bun-command: bun
          - runner: macos-15
            target: bun-darwin-arm64
            asset: glossa-macos-arm64
            bun-package: none
            bun-command: bun
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - uses: oven-sh/setup-bun@v2
        if: matrix.bun-package == 'none'
        with:
          bun-version: "1.3.14"
      - run: npm ci
      - name: Install baseline Bun
        if: matrix.bun-package != 'none'
        run: npm install --no-save --package-lock=false --ignore-scripts "${{ matrix.bun-package }}"
      - run: npm run build --workspace @glossa/protocol
      - name: Build standalone executable
        env:
          GLOSSA_BUN_TARGET: ${{ matrix.target }}
          GLOSSA_STANDALONE_ASSET: ${{ matrix.asset }}
        run: ${{ matrix.bun-command }} packages/cli/scripts/build-standalone.ts
      - name: Sign macOS executable
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - \
            --entitlements packages/cli/scripts/macos-entitlements.plist \
            "dist/standalone/${{ matrix.asset }}"
          codesign --verify --deep --strict "dist/standalone/${{ matrix.asset }}"
      - name: Smoke standalone executable
        run: node packages/cli/scripts/smoke-standalone.mjs "dist/standalone/${{ matrix.asset }}"
      - name: Smoke direct installer
        run: node packages/cli/scripts/smoke-direct-installer.mjs "dist/standalone/${{ matrix.asset }}" "${{ matrix.asset }}"
      - name: Build standalone update fixture
        env:
          GLOSSA_BUN_TARGET: ${{ matrix.target }}
          GLOSSA_STANDALONE_ASSET: ${{ matrix.asset }}
          GLOSSA_STANDALONE_OUTPUT_DIR: dist/update-fixture
          GLOSSA_STANDALONE_VERSION: 0.1.0-beta.999
        run: ${{ matrix.bun-command }} packages/cli/scripts/build-standalone.ts
      - name: Sign macOS update fixture
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - \
            --entitlements packages/cli/scripts/macos-entitlements.plist \
            "dist/update-fixture/${{ matrix.asset }}"
          codesign --verify --deep --strict "dist/update-fixture/${{ matrix.asset }}"
      - name: Smoke standalone update
        run: node packages/cli/scripts/smoke-standalone-update.mjs "dist/standalone/${{ matrix.asset }}" "dist/update-fixture/${{ matrix.asset }}" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/standalone/${{ matrix.asset }}
          if-no-files-found: error

  deploy-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      relay: ${{ steps.changed.outputs.relay }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: changed
        name: Detect relay changes
        env:
          BEFORE: ${{ github.event.before }}
        shell: bash
        run: |
          if [[ "$BEFORE" =~ ^0+$ ]] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "relay=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$BEFORE" "$GITHUB_SHA" -- \
            apps/relay \
            packages/protocol \
            package.json \
            package-lock.json \
            scripts/clean.mjs \
            tsconfig.base.json \
            Procfile; then
            echo "relay=false" >> "$GITHUB_OUTPUT"
          else
            echo "relay=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    if: needs.deploy-changes.outputs.relay == 'true'
    needs: [relay-check, windows-check, standalone-matrix, deploy-changes]
    runs-on: ubuntu-latest
    concurrency:
      group: heroku-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://mcp.glossa.sh/healthz
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Deploy tested commit to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git config --global credential.helper store
          printf '%s\n' "https://heroku:${HEROKU_API_KEY}@git.heroku.com" > ~/.git-credentials
          trap 'rm -f ~/.git-credentials' EXIT
          git push https://git.heroku.com/ariobarin-glossa.git HEAD:main
      - name: Verify production health
        run: |
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            --max-time 10 \
            https://mcp.glossa.sh/healthz
